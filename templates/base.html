<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Donor Management System</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow-sm">
  <div class="container">
    
    <!-- Brand -->
    <a class="navbar-brand fw-bold" href="/">
        HemoConnect
    </a>

    <!-- Navigation Buttons -->
    <div>
  <a href="/" class="btn btn-light btn-sm me-2">Home</a>
  <a href="/register" class="btn btn-outline-light btn-sm me-2">Register</a>

  <a href="/donor_login" class="btn btn-light btn-sm me-2">Donor Login</a>

  {% if session.get("admin") %}
  <a href="/logout" class="btn btn-light btn-sm me-2">Logout</a>
  {% else %}
  <a href="/admin" class="btn btn-light btn-sm me-2">Admin Login</a>
  {% endif %}
</div>

  </div>
</nav>

<!-- Page Content -->
{% block content %}
{% endblock %}

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
