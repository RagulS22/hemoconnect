{% extends "base.html" %}

{% block content %}

<div class="container mt-5" style="max-width:600px;">

<div class="card shadow p-4">

<h3 class="text-center mb-4 text-danger">Edit Donor</h3>

<form method="POST">

<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" name="name" class="form-control" value="{{ donor[1] }}" required>
</div>

<div class="mb-3">
<label class="form-label">Blood Group</label>
<input type="text" name="blood_group" class="form-control" value="{{ donor[2] }}" required>
</div>

<div class="mb-3">
<label class="form-label">Phone</label>
<input type="text" name="phone" class="form-control" value="{{ donor[3] }}" required>
</div>

<div class="mb-3">
<label class="form-label">City</label>
<input type="text" name="city" class="form-control" value="{{ donor[4] }}" required>
</div>

<div class="mb-3">
<label class="form-label">Availability</label>
<select name="availability" class="form-control">
<option value="Available">Available</option>
<option value="Not Available">Not Available</option>
</select>
</div>

<div class="text-center">
<button type="submit" class="btn btn-success">Update Donor</button>
<a href="/donors" class="btn btn-secondary">Cancel</a>
</div>

</form>

</div>
</div>

{% endblock %}
