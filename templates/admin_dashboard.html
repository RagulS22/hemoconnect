{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<h2 class="text-center text-danger mb-4">Admin Dashboard</h2>

<div class="row">

<div class="col-md-4">
<div class="card shadow text-center p-4">
<h4>Total Donors</h4>
<h2>{{ total_donors }}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card shadow text-center p-4">
<h4>Available Donors</h4>
<h2 class="text-success">{{ available_donors }}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card shadow text-center p-4">
<h4>Not Available</h4>
<h2 class="text-secondary">{{ not_available }}</h2>
</div>
</div>

</div>

<!-- Chart Section -->
<div class="card p-4 shadow mt-4">

<h4 class="text-center mb-4">Blood Group Distribution</h4>

<canvas id="bloodChart"
data-labels='{{ labels|tojson }}'
data-values='{{ values|tojson }}'
height="120">
</canvas>

</div>

<div class="text-center mt-4">
<a href="/donors" class="btn btn-danger">Manage Donors</a>
</div>

</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const canvas = document.getElementById("bloodChart");

const labels = JSON.parse(canvas.dataset.labels);
const values = JSON.parse(canvas.dataset.values);

new Chart(canvas, {
    type: "bar",
    data: {
        labels: labels,
        datasets: [{
            label: "Number of Donors",
            data: values,
            backgroundColor: [
                "#ff4d4d",
                "#ff6b6b",
                "#ff8787",
                "#ffa8a8",
                "#ffc9c9",
                "#ff4d6d",
                "#ff758f",
                "#ff8fa3"
            ],
            borderRadius: 5
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                display: false
            }
        }
    }
});

</script>

{% endblock %}
